[mcu EBB36_0]
canbus_uuid: fcf9bbc6fb95

[gcode_macro T0]
variable_color: ""
variable_tool_number: 0
gcode:
  SELECT_TOOL T=0

[tool T0]
tool_number: 0
extruder: extruder
gcode_x_offset: 0
gcode_y_offset: 0
gcode_z_offset: 0
params_park_x: 0 # The absolute X-position of the tool in its dock.
params_park_y: 250 # The absolute Y-position of the tool in its dock.
params_park_z: 10 # The absolute Z-position where the tool and shuttle mate in the dock, determined when the TAP (or Z-probe) triggers.
params_detach_x: 20   # X position with the toolhead screws safely outside of the docking slots.
params_detach_y: 230
params_detach_x: 10
params_input_shaper_freq_x: 57.8
params_input_shaper_type_x: 'mzv'
params_input_shaper_freq_y: 36.8
params_input_shaper_type_y: 'mzv'

#[tool_probe T0]
#pin: ^EBB36_0:PB6
#tool: 0 # change to the index of the tool. 0, 1, 2, etc.
#x_offset:0
#y_offset:0
#z_offset: 0 # Needs to be calibrated. More positive = More Squish
#speed: 5.0
#samples: 3
#samples_result: median
#sample_retract_dist: 2.0
#samples_tolerance: 0.02
#samples_tolerance_retries: 3
#activate_gcode:
#    _TAP_PROBE_ACTIVATE HEATER=extruder # change to match the extruder you are configuring: extruder, extruder1, etc.


## EXTRUDER MOTOR
## Connected to slot MOTOR3
[extruder]
step_pin: EBB36_0: PD0 #PG4
dir_pin: !EBB36_0: PD1 #PC1
enable_pin: !EBB36_0: PD2 #!PA0
microsteps: 16
Full_steps_per_rotation: 200
gear_ratio: 5:1
rotation_distance: 19.9737457776               # Applies to ProtoXtruder 1.0 - value needs to be udpdated based on your own calibration!
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBB36_0: PB13 #PA0                      # Hotend heater connected to HE0
sensor_type: EPCOS 100K B57560G104F
sensor_pin: EBB36_0: PA3 #PF4                      # Hotend thermistor connected to T0
min_temp: 10
max_temp: 350
min_extrude_temp: 170
pressure_advance: 0.04              # REQUIRES CALIBRATION!
pressure_advance_smooth_time: 0.002  # REQUIRES CALIBRATION!
max_extrude_only_distance: 250.0
max_extrude_only_velocity: 120
max_extrude_cross_section: 10
control: pid                         # REQUIRES PID CALIBRATION!
pid_Kp: 21.772
pid_Ki: 2.268
pid_Kd: 52.255

[tmc2209 extruder]
uart_pin: EBB36_0: PA15 #PC7
run_current: .650
interpolate: true
stealthchop_threshold: 0

[adxl345]
cs_pin: EBB36_0: PB12
spi_software_sclk_pin: EBB36_0: PB10
spi_software_mosi_pin: EBB36_0: PB11
spi_software_miso_pin: EBB36_0: PB2

[temperature_sensor EBB36_0]
sensor_type: temperature_mcu
sensor_mcu: EBB36_0
min_temp: 0
max_temp: 100

[fan]
pin: EBB36_0: PA0 #PD12                              # Connected to slot FAN2
kick_start_time: 0.2

[heater_fan heatbreak_cooling_fan]
pin: EBB36_0: PA1 #PD15                              # Connected to slot FAN3
heater: extruder
fan_speed: 0.8
heater_temp: 50.0