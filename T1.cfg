[mcu EBB36_1]
canbus_uuid: 8aad0aa0c9db

[gcode_macro T1]
variable_color: ""
variable_tool_number: 1
gcode:
  SELECT_TOOL T=1

[tool t1]
tool_number: 1
extruder: extruder1
gcode_x_offset: 0
gcode_y_offset: 0
gcode_z_offset: 0
params_park_x: 250 # The absolute X-position of the tool in its dock.
params_park_y: 250 # The absolute Y-position of the tool in its dock.
params_park_z: 10 # The absolute Z-position where the tool and shuttle mate in the dock, determined when the TAP (or Z-probe) triggers.
params_detach_x: 230 # X position with the toolhead screws safely outside of the docking slots.
params_detach_y: 230
params_detach_z: 10
params_input_shaper_freq_x: 57.8
params_input_shaper_type_x: 'mzv'
params_input_shaper_freq_y: 36.8
params_input_shaper_type_y: 'mzv'

[extruder1]
step_pin: EBB36_1: PD0 #PG4
dir_pin: !EBB36_1: PD1 #PC1
enable_pin: !EBB36_1: PD2 #!PA0
microsteps: 16
Full_steps_per_rotation: 200
gear_ratio: 5:1
rotation_distance: 19.9737457776               # Applies to ProtoXtruder 1.0 - value needs to be udpdated based on your own calibration!
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBB36_1: PB13 #PA0                      # Hotend heater connected to HE0
sensor_type: EPCOS 100K B57560G104F
sensor_pin: EBB36_1: PA3 #PF4                      # Hotend thermistor connected to T0
min_temp: -100
max_temp: 350
min_extrude_temp: 170
pressure_advance: 0.04              # REQUIRES CALIBRATION!
pressure_advance_smooth_time: 0.002  # REQUIRES CALIBRATION!
max_extrude_only_distance: 250.0
max_extrude_only_velocity: 120
max_extrude_cross_section: 10
control: pid                         # REQUIRES PID CALIBRATION!
pid_Kp: 21.772
pid_Ki: 2.268
pid_Kd: 52.255

[tmc2209 extruder1]
uart_pin: EBB36_1:PA15 #PC7
run_current: .650
interpolate: true
stealthchop_threshold: 0

[temperature_sensor EBB36_1]
sensor_type: temperature_mcu
sensor_mcu: EBB36_1
min_temp: 0
max_temp: 100

[adxl345 T1]
cs_pin: EBB36_1: PB12
spi_software_sclk_pin: EBB36_1: PB10
spi_software_mosi_pin: EBB36_1: PB11
spi_software_miso_pin: EBB36_1: PB2

[fan_generic T1_part_fan]
pin: EBB36_1: PA1 #PD12                              # Connected to slot FAN2
kick_start_time: 0.2

[heater_fan T1_heatbreak_cooling_fan]
pin: EBB36_1:PA0 #PD15                              # Connected to slot FAN3
heater: extruder1
fan_speed: 0.8
heater_temp: 50.0