## Section to set up homing and bed leveling with BDsensor

#[safe_z_home]
#home_xy_position: 117.5,82
#speed:100
#z_hop: 30
#z_hop_speed: 10

[bed_mesh]
speed: 150
horizontal_move_z: 5.0
#zero_reference_position: 117.5, 82 # Set this value to be the same as home_xy_position that is in the section safe_z_home
mesh_min: 15, 25
mesh_max: 200, 200
probe_count: 25, 25
#mesh_pps: 2,2
#fade_start: 1
#fade_end: 10
#fade_target: 0
algorithm: bicubic

# A [probe] section can be defined instead with a pin: setting identical
# to the sensor_pin: for a bltouch
[bltouch]
sensor_pin: ^EBB36_0: PB8 #^PB7
control_pin: EBB36_0: PB9 #PB6
#z_offset: 0
y_offset: -46
sample_retract_dist: 6.0
 

[screws_tilt_adjust]
screw1: 27, 92
screw1_name: front left
screw2: 195,92
screw2_name: front right
screw3: 195, 250
screw3_name: back right
screw4: 27, 250
screw4_name: back left
horizontal_move_z: 10
