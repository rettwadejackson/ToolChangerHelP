## Section to setup stepper motors, endstops and stepper motor drivers.

## B STEPPER MOTOR - LEFT
## Connected to slot MOTOR0
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 64
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop #PG6                     # Connected to slot DIAG0
position_endstop: 0
position_max: 232
homing_speed: 25
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PC4
diag_pin: ^PG6
#run_current: .6                     # Current for stock Creality 42-34 stepper motors.
interpolate: false
driver_SGTHRS: 58 # tune this once it's working
stealthchop_threshold: 999999

## A STEPPER MOTOR - RIGHT
## Connected to slot MOTOR1
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
microsteps: 64
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop #PG9                     # Connected to slot DIAG1
position_endstop: 250
position_max: 250
position_min: 0
homing_speed: 25
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: PD11
diag_pin: ^PG9
#run_current: .6                     # Current for stock Creality 42-34 stepper motors.
interpolate: false
driver_SGTHRS: 88 # tune this once it's working
stealthchop_threshold: 999999

## Z STEPPER MOTOR
## Connected to slot MOTOR2
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
microsteps: 128
rotation_distance: 4
full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop
position_max: 235
position_min: -2.5
homing_speed: 5
second_homing_speed: 3
homing_retract_speed: 2
homing_retract_dist: 5

[tmc2209 stepper_z]
uart_pin: PC6
run_current: 0.65                     # Current for stock Creality stepper motor - can be increased if required.
stealthchop_threshold: 999999
interpolate: true


